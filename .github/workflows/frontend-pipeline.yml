name: Build, Prettier, Lint, Test
permissions:
  contents: write
  packages: write
on:
  pull_request:
    branches: [main, staging]
jobs:
  frontend-pipeline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        browser: [chromium, firefox, webkit, "Mobile Chrome", "Mobile Safari"]

    steps:
      - name: Checkout code ⬇️
        uses: actions/checkout@v4

      - name: Setup Node.js using .nvmrc ⚙️
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Cache npm dependencies 💾
        id: cache-npm-deps
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies 📦
        if: steps.cache-npm-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright Browsers 🧭
        run: |
          BROWSER="${{ matrix.browser }}"
          case "$BROWSER" in
            "Mobile Chrome") npx playwright install --with-deps chromium &;;
            "Mobile Safari") npx playwright install --with-deps webkit &;;
            *) npx playwright install --with-deps "$BROWSER" &;;
          esac

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1

      - name: Fetch frontend .env from 1Password 🔐
        run: |
          cd apps/frontend
          echo "Fetching frontend .env from 1Password..."
          op read "op://${{ secrets.OP_VAULT_ID }}/${{ secrets.OP_FRONTEND_TEST_ENV_ITEM_ID }}/notesPlain" > .env
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Check Build 🏗️
        run: cd apps/frontend && npm run build

      - name: Check Prettier 🧹
        run: cd apps/frontend && npm run prettier:ci

      - name: Check Lint 🔎
        run: cd apps/frontend && npm run lint

      - name: Run Unit Tests 🧪
        run: cd apps/frontend && npm run test:unit

      - name: Get the source for the api ⬇️
        id: checkout-api
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: technologiestiftung/baer-gpt-v2-api-database
#          ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          ref: monorepo-migration
          path: api

      - name: Fetch backend .env from 1Password 🔐
        run: |
          cd api
          echo "Fetching backend .env from 1Password..."
          op read "op://${{ secrets.OP_VAULT_ID }}/${{ secrets.OP_BACKEND_TEST_ENV_ITEM_ID }}/notesPlain" > .env
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: install tools via asdf ⚙️
        uses: asdf-vm/actions/install@v4

      - name: Start supabase ⚡️
        run: |
          cd api
          supabase start --exclude studio,realtime,imgproxy,edge-runtime,logflare,supavisor,postgres-meta &

      - name: Start backend docker server ⚓️
        run: |
          cd api
          echo "Building backend Docker image..."
          docker build -t baergpt-backend .

          echo "Starting backend container..."
          docker run -d --network host --name baergpt-backend --env-file ./.env baergpt-backend

          echo "Waiting for backend container to start..."
          sleep 10

          # Check if container is running
          if ! docker ps | grep -q baergpt-backend; then
            echo "Backend container failed to start! Checking logs:"
            docker logs baergpt-backend
            exit 1
          fi
          echo "Backend container is running."

      - name: Wait for Supabase to be ready
        run: |
          timeout=600
          counter=0
          until curl -s http://localhost:54321/rest/v1/ >/dev/null; do
            if [ $counter -gt $timeout ]; then
              echo "Timed out waiting for Supabase"
              exit 1
            fi
            echo "Waiting for Supabase to be ready..."
            sleep 1
            counter=$((counter + 1))
          done
          echo "Supabase is ready!"

      - name: Run E2E test 🎭
        run: cd apps/frontend && npm run test:e2e -- --project="${{ matrix.browser }}"

      - name: Capture backend logs after E2E test after failure 📋
        if: failure()
        run: |
          echo "=== Backend container logs ==="
          docker logs baergpt-backend || echo "Could not get backend logs"
          echo "=== End backend logs ==="

      - name: Upload E2E test results ⬆️
        uses: actions/upload-artifact@v4
        if: ${{ failure() && !cancelled() }}
        with:
          name: playwright-e2e-test-results
          path: test-results
          retention-days: 30

      - name: Run A11y tests ♿️
        run: cd apps/frontend && npm run test:a11y -- --project="${{ matrix.browser }}"

      - name: Upload A11y test results ⬆️
        uses: actions/upload-artifact@v4
        if: ${{ failure() && !cancelled() }}
        with:
          name: playwright-a11y-test-results
          path: test-results

