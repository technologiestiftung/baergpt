name: Assess and Cleanup Orphaned Files

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  assess-orphans:
    runs-on: ubuntu-latest
    outputs:
      has_orphans: ${{ steps.check.outputs.has_orphans }}

    strategy:
      matrix:
        target: ["mistral"]

    steps:
      - name: Checkout code ⬇️
        uses: actions/checkout@v5

      - name: Setup Node.js using .nvmrc ⚙️
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Cache npm dependencies 💾
        id: cache-npm-deps
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies 📦
        if: steps.cache-npm-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Set environment item ID based on branch 🌿
        id: env-config
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_item_id=${{ secrets.OP_CLEANUP_ORPHANS_PRODUCTION_ENV_ITEM_ID }}" >> $GITHUB_OUTPUT
          else
            echo "env_item_id=${{ secrets.OP_CLEANUP_ORPHANS_STAGING_ENV_ITEM_ID }}" >> $GITHUB_OUTPUT
          fi

      - name: Install 1Password CLI 🔐
        uses: 1password/install-cli-action@v2

      - name: Fetch backend .env from 1Password ⬇️
        run: |
          cd apps/backend
          echo "Fetching backend .env from 1Password..."
          op read "op://${{ secrets.OP_VAULT_ID }}/${{ steps.env-config.outputs.env_item_id }}/notesPlain" > .env
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Assess orphaned ${{ matrix.target }} files 🔬
        id: check
        working-directory: apps/backend
        run: |
          output=$(npm run ${{ matrix.target }}:assess-orphans 2>&1)
          echo "$output"
          if echo "$output" | grep -q "No orphans found."; then
            echo "has_orphans=false" >> $GITHUB_OUTPUT
          else
            echo "has_orphans=true" >> $GITHUB_OUTPUT
          fi

  manual-approve:
    name: Waiting for Approval to Cleanup
    runs-on: ubuntu-latest
    needs: assess-orphans
    if: needs.assess-orphans.outputs.has_orphans == 'true'
    environment: cleanup-approval
    strategy:
      matrix:
        target: ["mistral"]
    steps:
      - name: Approval granted
        run: |
          echo "Approval received to cleanup orphaned files for target: ${{ matrix.target }}. Proceeding with cleanup..."

  cleanup-orphans:
    name: Cleanup Orphaned Files
    runs-on: ubuntu-latest
    needs: [assess-orphans, manual-approve]
    if: needs.assess-orphans.outputs.has_orphans == 'true'
    strategy:
      matrix:
        target: ["mistral"]

    steps:
      - name: Checkout code ⬇️
        uses: actions/checkout@v5

      - name: Setup Node.js using .nvmrc ⚙️
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Cache npm dependencies 💾
        id: cache-npm-deps
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies 📦
        if: steps.cache-npm-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Set environment item ID based on branch 🌿
        id: env-config
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_item_id=${{ secrets.OP_CLEANUP_ORPHANS_PRODUCTION_ENV_ITEM_ID }}" >> $GITHUB_OUTPUT
          else
            echo "env_item_id=${{ secrets.OP_CLEANUP_ORPHANS_STAGING_ENV_ITEM_ID }}" >> $GITHUB_OUTPUT
          fi

      - name: Install 1Password CLI 🔐
        uses: 1password/install-cli-action@v2

      - name: Fetch backend .env from 1Password ⬇️
        run: |
          cd apps/backend
          echo "Fetching backend .env from 1Password..."
          op read "op://${{ secrets.OP_VAULT_ID }}/${{ steps.env-config.outputs.env_item_id }}/notesPlain" > .env
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Cleanup orphaned ${{ matrix.target }} files 🗑️
        working-directory: apps/backend
        run: npm run ${{ matrix.target }}:cleanup-orphans
