name: prettier-eslint.yml
on:
  pull_request:
    branches: ['**']
jobs:
  prettier-eslint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code ⬇️
        uses: actions/checkout@v5

      - name: Setup Node.js using .nvmrc ⚙️
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Cache npm dependencies 💾
        id: cache-npm-deps
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies 📦
        if: steps.cache-npm-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Check Prettier 🧹
        run: |
          npm run prettier:check --workspace=apps/admin-panel 
          npm run prettier:check --workspace=apps/backend
          npm run prettier:check --workspace=apps/frontend

      - name: Check Linting 🔎
        run: |
          npm run lint:check --workspace=apps/admin-panel
          npm run lint:check --workspace=apps/backend
          npm run lint:check --workspace=apps/frontend
