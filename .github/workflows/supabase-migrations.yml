name: Deploy Supabase Migrations

on:
  push:
    paths:
      - "apps/backend/supabase/migrations/**"
    branches:
      - main
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_PRODUCTION_DB_PASSWORD || secrets.SUPABASE_STAGING_DB_PASSWORD }}
      PROJECT_ID: ${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_PRODUCTION_PROJECT_ID || secrets.SUPABASE_STAGING_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.40.7

      - name: Apply Supabase migrations
        run: |
          supabase link --project-ref $PROJECT_ID
          supabase db push
